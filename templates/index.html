<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票分析系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            padding: 40px 0;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        .card-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .card h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        .card p {
            color: #666;
            line-height: 1.6;
        }
        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>股票分析系统</h1>
            <p>基于akshare数据的智能股票分析平台</p>
        </div>
        
        <div class="card-grid">
            <a href="/today" class="card">
                <div class="card-icon">🔥</div>
                <h2>今天行情</h2>
                <p>实时查看涨停板、跌停板、成交量和成交额排行</p>
                <span class="badge">查看详情 →</span>
            </a>
            
            <a href="/dragon-tiger" class="card">
                <div class="card-icon">📊</div>
                <h2>龙虎榜分析</h2>
                <p>分析近3天连续上榜的股票，筛选主板和创业板中5日涨幅大于5%的优质股票</p>
                <span class="badge">查看详情 →</span>
            </a>
        </div>
    </div>
</body>
</html>
